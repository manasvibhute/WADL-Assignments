<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Booking - Book</title>

    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>
    <div data-role="page" id="booking">
        <div data-role="header" data-position="fixed">
            <a href="index.html" data-icon="home" data-iconpos="notext" data-ajax="false">Home</a>
            <h1>Book Your Trip</h1>
        </div>

        <div role="main" class="ui-content">
            <h2>Booking Form</h2>
            <p class="page-intro">Add your travel details and preferences to send a quick booking request.</p>
            <form id="booking-form" class="form-panel">
                <label for="full-name">Full Name:</label>
                <input type="text" name="full-name" id="full-name" placeholder="Enter your full name" required>

                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="your@email.com" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" name="phone" id="phone" placeholder="+1 234 567 890" required>

                <label for="destination">Destination:</label>
                <select name="destination" id="destination" required>
                    <option value="">Choose destination...</option>
                    <option value="paris">Paris, France</option>
                    <option value="rome">Rome, Italy</option>
                    <option value="london">London, UK</option>
                    <option value="tokyo">Tokyo, Japan</option>
                    <option value="bali">Bali, Indonesia</option>
                    <option value="new-york">New York, USA</option>
                    <option value="rio">Rio de Janeiro, Brazil</option>
                </select>

                <label for="travellers">Number of Travellers:</label>
                <input type="range" name="travellers" id="travellers" value="2" min="1" max="10">

                <label for="departure">Departure Date:</label>
                <input type="date" name="departure" id="departure" required>

                <fieldset data-role="controlgroup">
                    <legend>Travel Class:</legend>
                    <input type="radio" name="travel-class" id="economy" value="economy" checked>
                    <label for="economy">Economy</label>
                    <input type="radio" name="travel-class" id="business" value="business">
                    <label for="business">Business</label>
                    <input type="radio" name="travel-class" id="first" value="first">
                    <label for="first">First Class</label>
                </fieldset>

                <fieldset data-role="controlgroup">
                    <legend>Add-ons:</legend>
                    <input type="checkbox" name="insurance" id="insurance">
                    <label for="insurance">Travel Insurance (Rs. 500)</label>
                    <input type="checkbox" name="guide" id="guide">
                    <label for="guide">Personal Guide (Rs. 200)</label>
                    <input type="checkbox" name="car" id="car">
                    <label for="car">Car Rental (Rs. 150)</label>
                </fieldset>

                <button type="submit" class="ui-btn ui-btn-b ui-corner-all primary-btn" data-icon="check">Book Now</button>
            </form>
        </div>

        <div data-role="footer" data-position="fixed">
            <div data-role="navbar">
                <ul>
                    <li><a href="index.html" data-icon="home" data-ajax="false">Home</a></li>
                    <li><a href="destination.html" data-icon="grid" data-ajax="false">Destinations</a></li>
                    <li><a href="book.html" class="ui-btn-active ui-state-persist" data-icon="calendar" data-ajax="false">Book</a></li>
                    <li><a href="contact.html" data-icon="mail" data-ajax="false">Contact</a></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        $(document).on("submit", "#booking-form", async function (event) {
            event.preventDefault();

            const form = event.currentTarget;
            const addOns = Array.from(form.querySelectorAll("input[type='checkbox']:checked"))
                .map(input => {
                    const label = form.querySelector(`label[for="${input.id}"]`);
                    return label ? label.textContent.trim() : input.name;
                });

            const payload = {
                fullName: $("#full-name").val(),
                email: $("#email").val(),
                phone: $("#phone").val(),
                destination: $("#destination option:selected").text(),
                travellers: $("#travellers").val(),
                departure: $("#departure").val(),
                travelClass: $("input[name='travel-class']:checked").val(),
                addOns: addOns
            };

            try {
                const response = await fetch("/api/bookings", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.message || "Unable to save booking.");
                    return;
                }

                alert(result.message);
                form.reset();
                $("#travellers").val(2).slider("refresh");
                $("#economy").prop("checked", true).checkboxradio("refresh");
                $("input[type='checkbox']", form).prop("checked", false).checkboxradio("refresh");
                $("#destination").selectmenu("refresh");
            } catch {
                alert("Start the backend with npm start, then open http://localhost:3000.");
            }
        });
    </script>
</body>
</html>
