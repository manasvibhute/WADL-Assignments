<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FitTrack | Activity</title>
    <!-- <link rel="stylesheet" href="gray-ui.css"> -->
    <link rel="stylesheet" href="activity.css">
</head>

<body>
<div class="main-bg">

    <nav class="navbar">
        <div class="logo">FitTrack</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="activity.html" class="active">Activity</a>
            <a href="diet.html">Diet</a>
            <a href="summary.html">Summary</a>
        </div>
    </nav>

    <div class="top-heading">
        <h3>Today's Activity</h3>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <p class="label">Steps</p>
            <h3>7,842</h3>
        </div>
        <div class="stat-card">
            <p class="label">Calories Burned</p>
            <h3>423 kcal</h3>
        </div>
        <div class="stat-card">
            <p class="label">Active Minutes</p>
            <h3>48 min</h3>
        </div>
    </div>

    <div class="bottom-section">
        <div class="activity-box">
            <h3>Log Activity</h3>

            <label>Activity Type</label>
            <select>
                <option>Select activity</option>
                <option>Walking</option>
                <option>Running</option>
                <option>Yoga</option>
            </select>

            <label>Duration (minutes)</label>
            <input type="number" placeholder="30">

            <button class="save-btn">Save Activity</button>
        </div>

        <div class="list-box">
            <h3>Today's Log</h3>
            <ul>
                <li>Walking – 30 min</li>
                <li>Yoga – 20 min</li>
                <li>Cycling – 40 min</li>
            </ul>
        </div>
    </div>

</div>
</body>
</html>
